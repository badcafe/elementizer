<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elementizer</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>
</head>
<body>
    <zero-md src="README.md">
        <template data-append>
            <style>
.markdown-body {
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
}
#api {
  margin-left: -240px;
  margin-right: -240px;
  max-width: calc(100% + 480px);
}
#api > table {
  margin: auto;
  margin-top: 1rem;
}
            </style>
        </template>
    </zero-md>
</body>
</html>
